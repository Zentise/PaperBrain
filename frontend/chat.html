<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperBrain — Chat</title>
  <meta name="description" content="Chat with your indexed documents using AI. Grounded answers with source citations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%236e56cf'/><text x='16' y='22' text-anchor='middle' fill='white' font-family='monospace' font-size='17' font-weight='700'>P</text></svg>">
</head>
<body>

<div class="chat-layout">

  <!-- ── Left Sidebar ── -->
  <aside class="chat-sidebar" aria-label="Model selection and session">

    <!-- Top: logo + back link -->
    <div class="chat-sidebar-top">
      <div class="logo-row">
        <div class="logo-mark">P</div>
        <span class="logo-text">PaperBrain</span>
      </div>
      <a class="back-link" href="index.html" aria-label="Back to upload page">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Upload
      </a>
    </div>

    <!-- Model section -->
    <div class="model-section" role="navigation" aria-label="Model selector">
      <span class="label" style="margin-bottom:12px">MODEL</span>
      <div id="sidebar-models"></div>
    </div>

    <!-- Indexed section -->
    <div class="indexed-section">
      <span class="label">INDEXED</span>
      <div id="indexed-list" class="indexed-list"></div>
      <a class="manage-link" href="index.html">Manage →</a>
    </div>

    <!-- Session section -->
    <div class="session-section">
      <span class="label">SESSION</span>
      <span id="session-display" class="session-id">—</span>
      <button id="new-chat-btn" class="btn btn-ghost full-width mt-8"
              aria-label="Start new chat session">
        New Chat
      </button>
    </div>

  </aside>

  <!-- ── Main Chat ── -->
  <main class="chat-main">

    <!-- Top bar -->
    <header class="chat-topbar">
      <div class="topbar-model-info">
        <span id="topbar-model-name" class="topbar-model-name">—</span>
        <span class="topbar-model-sep" aria-hidden="true">·</span>
        <span id="topbar-model-desc" class="topbar-model-desc">—</span>
      </div>
      <div id="conf-display" class="conf-display hidden" aria-label="Response confidence">
        <span class="label" style="display:inline">CONF</span>
        <span id="conf-score" class="conf-score">—</span>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages" class="messages" role="log" aria-live="polite" aria-label="Conversation">

      <!-- Empty state -->
      <div id="empty-state" class="empty-state" aria-label="No messages yet">
        <div class="empty-logo" aria-hidden="true"></div>
        <span class="empty-title">Ready</span>
        <span class="empty-sub">Select a model and start asking</span>
      </div>

      <!-- Typing indicator (moved into messages by JS) -->
      <div id="typing" class="typing-indicator hidden" role="status" aria-label="Thinking">
        <div class="typing-dots" aria-hidden="true">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

    </div>

    <!-- Input area -->
    <div class="input-area" role="form" aria-label="Chat input">

      <!-- Model picker popup -->
      <div id="model-picker" class="hidden" role="dialog" aria-label="Select model">
        <div id="picker-models"></div>
      </div>

      <div class="input-wrap">
        <textarea
          id="msg-input"
          placeholder="Ask about your documents…"
          rows="1"
          aria-label="Message input"
          aria-multiline="true"
        ></textarea>
        <div class="input-bottom">
          <!-- Left: model indicator -->
          <div id="model-indicator" class="model-indicator" role="button"
               aria-haspopup="dialog" aria-expanded="false"
               aria-label="Switch model" tabindex="0">
            <div id="indicator-dot" class="indicator-dot" style="background:#22c55e"></div>
            <span id="indicator-label" class="indicator-label">GEMINI</span>
          </div>

          <!-- Right: char count + attach + send -->
          <div class="input-actions">
            <span id="char-count" class="label" style="text-transform:none;letter-spacing:normal">
              0/2000
            </span>
            <button id="attach-btn" class="btn-attach" title="Attach PDF"
                    aria-label="Attach and ingest a PDF">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M13.5 7.5L6 15a4 4 0 01-5.66-5.66l8-8a2.5 2.5 0 013.54 3.54L4.5 12.5a1 1 0 01-1.41-1.41L10 4"
                      stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button id="send-btn" disabled aria-label="Send message">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M14 8H2M10 4l4 4-4 4" stroke="currentColor" stroke-width="1.5"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Hidden file input for attach -->
      <input type="file" id="attach-input" accept=".pdf" hidden aria-hidden="true">
    </div>

  </main>

</div>

<script type="module" src="js/chat.js"></script>
</body>
</html>
